name: Release

# Builds a signed release APK and publishes it as a GitHub Release asset, so
# anyone can download and sideload it. Not published to Google Play - this is
# the entire distribution mechanism.
#
# Cut a release with:
#   git tag v1.2.0
#   git push origin v1.2.0
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   RELEASE_KEYSTORE_BASE64   base64-encoded release.jks (see README.md)
#   RELEASE_KEYSTORE_PASSWORD
#   RELEASE_KEY_ALIAS
#   RELEASE_KEY_PASSWORD
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # needed to create the GitHub Release and upload assets

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "${RELEASE_KEYSTORE_BASE64}" | base64 -d > "${RUNNER_TEMP}/release.jks"

      - name: Build signed release APK
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Remove decoded keystore
        if: always()
        run: rm -f "${RUNNER_TEMP}/release.jks"

      - name: Rename APK with version tag
        run: |
          mkdir -p release-out
          cp app/build/outputs/apk/release/app-release.apk "release-out/ha-dashclock-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-out/ha-dashclock-${{ github.ref_name }}.apk
          generate_release_notes: true
